<!DOCTYPE html>
<html>
  <head>
    <title>My Wishlist</title>
    <style>
      /* Global styles */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      
      /* Header styles */
      header {
        background-color: #2c3e50;
        color: #fff;
        padding: 20px;
        text-align: center;
      }
      
      /* Form styles */
      form {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin: 20px;
      }
      
      label {
        font-weight: bold;
        margin-right: 10px;
      }
      
      input[type="text"] {
        border: none;
        border-radius: 4px;
        box-shadow: inset 0 2px 3px rgba(0,0,0,0.1);
        font-size: 16px;
        padding: 10px;
        width: 200px;
      }
      
      input[type="submit"] {
        background-color: #2c3e50;
        border: none;
        border-radius: 4px;
        box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        color: #fff;
        cursor: pointer;
        font-size: 16px;
        margin-left: 10px;
        padding: 10px 20px;
      }
      
      input[type="submit"]:hover {
        background-color: #34495e;
      }
      
      /* Wishlist styles */
      h2 {
        margin: 20px;
      }
      
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      
      li {
        border: 1px solid #ccc;
        border-radius: 4px;
        box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        margin: 10px;
        padding: 10px;
      }
      
      a {
        color: #2c3e50;
        text-decoration: none;
      }
      
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>My Wishlist</h1>
    </header>
    
    <form>
      <label for="product-url">Product URL:</label>
      <input type="text" id="product-url" name="product-url">
      <label for="product-name">Product Name:</label>
      <input type="text" id="product-name" name="product-name">
      <label for="product-price">Product Price:</label>
      <input type="text" id="product-price" name="product-price">
      <input type="submit" value="Add to Wishlist">
    </form>
    
    <h2>My Wishlist Items:</h2>
    <ul id="wishlist">
      <!-- Wishlist items will be dynamically added here -->
    </ul>

    <script>
      // Add event listener for form submission
      document.querySelector('form').addEventListener('submit', function(event) {
        event.preventDefault();
        
        // Get input values
        const url = document.querySelector('#product-url').value;
        const name = document.querySelector('#product-name').value;
        const price = document.querySelector('#product-price').value;
        
        // Create new wishlist item
        const item = document.createElement('li');
        item.innerHTML = `
          <a href="${url}">${name}</a> - $${price}
        `;
        
        // Add item to wishlist
        document.querySelector('#wishlist').appendChild(item);
        
        // Clear form inputs
        document.querySelector('#product-url').value = '';
        document.querySelector('#product-name').value = '';
        document.querySelector('#product-price').value = '';
      });
    </script>
  </body>
</html>
