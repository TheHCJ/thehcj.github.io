<!DOCTYPE html>
<html>
  <head>
    <title>Gift List Creator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Font Awesome/css/all.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <header>
      <h1>Gift List Maker</h1>
      <nav>
        <button class="clear-btn" id="clear-btn"><i class="fa-solid fa-trash"></i></button>
        <button id="save-btn"><i class="fa-solid fa-floppy-disk"></i></button>
        <button id="theme-switcher">Toggle Theme</button>
      </nav>
    </header>
    <div class="wrapper">
      <form id="add-form">
        <input type="text" id="new-item" placeholder="Add new item">
        <button type="submit"><i class="fas fa-plus"></i></button>
      </form>
      <ul id="my-list"></ul>
    </div>
   
    <script>
      const addItem = () => {
        const newItem = document.getElementById("new-item").value;
        const list = document.getElementById("my-list");
        const li = document.createElement("li");
        li.textContent = newItem;
        const removeBtn = document.createElement("button");
        removeBtn.innerText = "X";
        removeBtn.classList = "remove-btn"
        removeBtn.onclick = () => {
          list.removeChild(li);
        };
        li.appendChild(removeBtn);
        list.appendChild(li);
        document.getElementById("new-item").value = "";
        return false;
      };
      
      const saveFile = () => {
        const html = document.documentElement.outerHTML;
        const file = new Blob([html], {type: "text/html"});
        const a = document.createElement("a");
        const url = URL.createObjectURL(file);
        a.href = url;
        a.download = "my-list.html";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);  
        }, 0);
      };
      
      const clearList = () => {
        const list = document.getElementById("my-list");
        list.innerHTML = "";
      };

      const toggleTheme = () => {
        const body = document.body;
        body.classList.toggle("dark-theme");
      };

      document.getElementById("add-form").addEventListener("submit", (event) => {
        event.preventDefault();
        addItem();
      });
      document.getElementById("save-btn").addEventListener("click", () => {
        saveFile();
      });
      document.getElementById("clear-btn").addEventListener("click", () => {
        clearList();
      });
      document.getElementById("theme-switcher").addEventListener("click", () => {
        toggleTheme();
      });
    </script>
  </body>
</html>
